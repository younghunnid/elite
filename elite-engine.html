<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Elite Engineering | Advanced Systems &amp; Automation</title>
    <meta name="description" content="Elite Engineering provides expert systems architecture, industrial automation, and high-performance technical solutions.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            screens: {
              'xs': '400px',
              '2xl': '1600px',
            },
            fontSize: {
              'fluid-h1': 'clamp(1.875rem, 8vw, 4.5rem)',
              'fluid-h2': 'clamp(1.5rem, 6vw, 3rem)',
              'fluid-body': 'clamp(0.875rem, 2vw, 1.125rem)',
            },
            spacing: {
              'safe-top': 'env(safe-area-inset-top)',
              'safe-bottom': 'env(safe-area-inset-bottom)',
            },
            borderRadius: {
              'mobile': '2rem',
              'desktop': '4rem',
            },
            colors: {
              blue: {
                50: '#E0E8FF',
                100: '#B3C7FF',
                200: '#80A6FF',
                300: '#4D85FF',
                400: '#2E6BFF',
                500: '#1649C6',
                600: '#0E2F8A',
                700: '#0A246C',
                800: '#071B50',
                900: '#041339',
                950: '#020A26'
              },
              yellow: {
                50: '#FFFBE0',
                100: '#FFF7B3',
                200: '#FFF380',
                300: '#FFEF4D',
                400: '#FFD400',
                500: '#FFCA00',
                600: '#FFB700',
                700: '#FF9E00',
                800: '#FF8500',
                900: '#FF6C00'
              },
              slate: {
                50: '#F5F7FA',
                100: '#E2E8F0',
                200: '#CBD5E1',
                300: '#94A3B8',
                400: '#64748B',
                500: '#475569',
                600: '#334155',
                700: '#1E293B',
                800: '#0F172A',
                900: '#0E2F8A',
                950: '#0E2F8A'
              }
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <style>
        /* copy the custom root variables and utility classes from index.html */
        :root {
          --brand-blue: #1649C6;
          --brand-dark-blue: #0E2F8A;
          --brand-light-blue: #2E6BFF;
          --brand-yellow: #FFD400;
          --brand-white: #FFFFFF;
          --brand-light-gray: #F5F7FA;
        }
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            min-height: -webkit-fill-available;
        }
        html { height: -webkit-fill-available; }
        input, select, textarea { font-size: 16px !important; }
        * { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
        .transition-all-300 { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .section-spacing { padding-top: clamp(3rem, 10vw, 8rem); padding-bottom: clamp(3rem, 10vw, 8rem); }
        .dark .text-blue-600,
        .dark .text-blue-400,
        .dark .text-blue-500,
        .dark .text-blue-950 { color: var(--brand-white) !important; }
        .dark .bg-slate-900 *,
        .dark .bg-slate-950 *,
        .dark .bg-blue-950 *,
        .dark .bg-blue-900 * { color: var(--brand-white) !important; }
        .dark ::placeholder { color: #cbd5e1 !important; opacity: 1; }
        .dark .text-slate-400,
        .dark .text-slate-500,
        .dark .text-slate-600,
        .dark .text-slate-700,
        .dark .text-slate-800 { color: #cbd5e1 !important; }
        .cta-btn { background-color: var(--brand-yellow); color: var(--brand-blue); border-radius: 10px; font-weight: bold; text-transform: uppercase; transition: all 0.3s ease; }
        .cta-btn:hover { background-color: var(--brand-blue); color: var(--brand-yellow); border: 2px solid var(--brand-yellow); }
        .hero-gradient { background: linear-gradient(90deg, var(--brand-blue) 0%, var(--brand-yellow) 100%); }
    </style>
</head>
<body class="bg-blue-500 dark:bg-blue-500 text-white transition-colors duration-300 overflow-x-hidden">
    <div id="root"></div>
    <script>
        // Force engineering world when loading this page
        sessionStorage.setItem('activeWorld', 'engineering');
        sessionStorage.setItem('currentPage', 'home');
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
